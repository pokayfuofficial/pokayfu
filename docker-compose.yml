version: '3.9'

services:
  # ── PostgreSQL ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pokayfu_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     pokayfu
      POSTGRES_PASSWORD: pokayfu_pass
      POSTGRES_DB:       pokayfu_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pokayfu"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: pokayfu_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-совместимое хранилище) ───────
  minio:
    image: minio/minio:latest
    container_name: pokayfu_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Web UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Создание bucket в MinIO при старте ─────
  minio-init:
    image: minio/mc:latest
    container_name: pokayfu_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/pokayfu-media --ignore-existing;
      mc anonymous set download local/pokayfu-media;
      echo 'MinIO bucket created';
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
